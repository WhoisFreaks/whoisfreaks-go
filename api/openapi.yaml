openapi: 3.0.3
info:
  contact:
    email: support@whoisfreaks.com
    name: WhoisFreaks Support
    url: https://whoisfreaks.com
  description: |
    Complete WhoisFreaks API — WHOIS, DNS, SSL, Geolocation, Typosquatting,
    IP Intelligence, Domain Reputation, and bulk database downloads.

    ## Authentication
    All requests require an `apiKey` query parameter.

    ## Resources
    - Docs: https://whoisfreaks.com/documentation
    - Billing: https://billing.whoisfreaks.com
    - Support: support@whoisfreaks.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: WhoisFreaks API
  version: 1.0.0
servers:
- description: API Solutions (live lookups)
  url: https://api.whoisfreaks.com
- description: Database file downloads
  url: https://files.whoisfreaks.com
security:
- ApiKeyAuth: []
tags:
- description: "WHOIS lookup APIs (live, historical, reverse, bulk)"
  name: WHOIS
- description: "DNS lookup APIs (live, historical, reverse, bulk)"
  name: DNS
- description: Check domain availability
  name: Domain Availability
- description: Detect typo variants of brand domains
  name: Typosquatting
- description: SSL certificate lookup
  name: SSL
- description: IP geolocation lookup
  name: Geolocation
- description: Subdomain enumeration
  name: Subdomains
- description: IP threat intelligence
  name: IP Reputation
- description: Real-time domain threat assessment and trust scoring
  name: Domain Reputation
- description: Autonomous System Number WHOIS
  name: ASN WHOIS
- description: IP address WHOIS
  name: IP WHOIS
- description: "Account, API key, and usage utilities"
  name: Account
- description: Newly registered domain downloads
  name: Databases - Newly Registered
- description: Expiring and dropped domain downloads
  name: Databases - Expiring & Dropped
- description: WHOIS database snapshots
  name: Databases - WHOIS
- description: DNS database snapshots
  name: Databases - DNS
- description: Subdomain database snapshots
  name: Databases - Subdomains
- description: IP geolocation database snapshots
  name: Databases - IP Geolocation
- description: ASN WHOIS database snapshots
  name: Databases - ASN WHOIS
- description: IP WHOIS database snapshots
  name: Databases - IP WHOIS
- description: IP security database snapshots
  name: Databases - IP Security
paths:
  /v2.0/whois/live:
    get:
      description: Real-time WHOIS lookup from authoritative servers. Cost 1 credit.
      operationId: whoisLive
      parameters:
      - example: whoisfreaks.com
        explode: true
        in: query
        name: domainName
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: format
        required: false
        schema:
          default: json
          enum:
          - json
          - xml
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WhoisResponse'
          description: Successful response
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Invalid API key
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Not found
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Too many requests
      summary: Live WHOIS Lookup
      tags:
      - WHOIS
  /v2.0/bulkwhois/live:
    post:
      description: Up to 100 domains in one request. 1 credit per successful domain.
      operationId: bulkWhois
      parameters:
      - explode: true
        in: query
        name: format
        required: false
        schema:
          default: json
          enum:
          - json
          - xml
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/bulkWhois_request'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkWhoisResponse'
          description: Successful response
        "4XX":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response (4XX)
      summary: Bulk WHOIS Lookup
      tags:
      - WHOIS
  /v2.0/dns/live:
    get:
      description: Real-time DNS record lookup. 1 credit per query.
      operationId: dnsLive
      parameters:
      - explode: true
        in: query
        name: domainName
        required: false
        schema:
          type: string
        style: form
      - description: Use for PTR lookups
        explode: true
        in: query
        name: ipAddress
        required: false
        schema:
          type: string
        style: form
      - description: "all or comma-separated: A,MX,NS,TXT,SOA,SPF,AAAA,CNAME"
        explode: true
        in: query
        name: type
        required: true
        schema:
          default: all
          type: string
        style: form
      - explode: true
        in: query
        name: format
        required: false
        schema:
          default: json
          enum:
          - json
          - xml
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DnsResponse'
          description: Successful response
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Invalid API key
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Too many requests
      summary: Live DNS Lookup
      tags:
      - DNS
  /v2.0/dns/historical:
    get:
      description: All historical DNS records. 2 credits per page (100 records/page).
      operationId: dnsHistorical
      parameters:
      - explode: true
        in: query
        name: domainName
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: type
        required: true
        schema:
          default: all
          type: string
        style: form
      - explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: format
        required: false
        schema:
          default: json
          enum:
          - json
          - xml
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoricalDnsResponse'
          description: Successful response
        "4XX":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response (4XX)
      summary: Historical DNS Lookup
      tags:
      - DNS
  /v2.1/dns/reverse:
    get:
      description: Search domains by IP or DNS value. 5 credits per page.
      operationId: dnsReverse
      parameters:
      - description: "IP, CIDR, or record value"
        explode: true
        in: query
        name: value
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: type
        required: true
        schema:
          enum:
          - a
          - mx
          - cname
          - ns
          - aaaa
          - txt
          - soa
          type: string
        style: form
      - explode: true
        in: query
        name: exact
        required: false
        schema:
          default: true
          type: boolean
        style: form
      - explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: format
        required: false
        schema:
          default: json
          enum:
          - json
          - xml
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReverseDnsResponse'
          description: Successful response
        "4XX":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response (4XX)
      summary: Reverse DNS Lookup
      tags:
      - DNS
  /v2.0/dns/bulk/live:
    post:
      description: Up to 100 domains + 100 IPs in one request.
      operationId: dnsBulk
      parameters:
      - explode: true
        in: query
        name: type
        required: true
        schema:
          default: all
          type: string
        style: form
      - explode: true
        in: query
        name: format
        required: false
        schema:
          default: json
          enum:
          - json
          - xml
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/dnsBulk_request'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkDnsResponse'
          description: Successful response
        "4XX":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response (4XX)
      summary: Bulk DNS Lookup
      tags:
      - DNS
  /v2.0/domain/availability:
    get:
      description: Check availability of a single domain and optionally get suggestions
        across multiple TLDs. 1 credit per domain checked. sug=false checks only the
        queried domain; sug=true returns up to `count` (max 100) TLD suggestions.
      operationId: domainAvailabilityV2
      parameters:
      - description: The domain name to check
        example: google.com
        explode: true
        in: query
        name: domain
        required: true
        schema:
          type: string
        style: form
      - description: Whether to return TLD suggestions alongside the queried domain.
        explode: true
        in: query
        name: sug
        required: false
        schema:
          default: false
          type: boolean
        style: form
      - description: Number of TLD suggestions to return when sug=true. Maximum is
          100.
        explode: true
        in: query
        name: count
        required: false
        schema:
          default: 5
          maximum: 100
          minimum: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: format
        required: false
        schema:
          default: json
          enum:
          - json
          - xml
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainAvailabilityResponse'
          description: Successful response
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Invalid API key
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Too many requests
      summary: Domain Availability Check with Suggestions
      tags:
      - Domain Availability
    post:
      description: "Two bulk modes. Mode 1: POST domainNames array. Mode 2: POST tld\
        \ array plus domain query param. Max 100 domains per request. 1 credit per\
        \ domain checked."
      operationId: bulkDomainAvailabilityV2
      parameters:
      - description: Required for TLD-mode bulk check (base domain).
        example: google.com
        explode: true
        in: query
        name: domain
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: format
        required: false
        schema:
          default: json
          enum:
          - json
          - xml
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkDomainAvailabilityRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkDomainAvailabilityResponse'
          description: Successful response
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Invalid API key
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Too many requests
      summary: Bulk Domain Availability Check
      tags:
      - Domain Availability
  /v3.0/domain/typos:
    get:
      description: Find typo variants of a brand. 5 credits per page.
      operationId: typosquatting
      parameters:
      - explode: true
        in: query
        name: keyword
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: pattern
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: pageToken
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TyposquattingResponse'
          description: Successful response
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Invalid API key
      summary: Typosquatting Lookup
      tags:
      - Typosquatting
  /v1.0/ssl/live:
    get:
      description: Real-time SSL cert with optional chain.
      operationId: sslLookup
      parameters:
      - explode: true
        in: query
        name: domainName
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: chain
        required: false
        schema:
          default: false
          type: boolean
        style: form
      - explode: true
        in: query
        name: sslRaw
        required: false
        schema:
          default: false
          type: boolean
        style: form
      - explode: true
        in: query
        name: format
        required: false
        schema:
          default: json
          enum:
          - json
          - xml
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SslResponse'
          description: Successful response
        "4XX":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response (4XX)
      summary: SSL Certificate Lookup
      tags:
      - SSL
  /v1.0/geolocation:
    get:
      description: "Get location, ASN, currency for an IP. 1 credit."
      operationId: geolocation
      parameters:
      - explode: true
        in: query
        name: ip
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeolocationResponse'
          description: Successful response
        "4XX":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response (4XX)
      summary: IP Geolocation Lookup
      tags:
      - Geolocation
    post:
      description: Up to 100 IPs.
      operationId: bulkGeolocation
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/bulkGeolocation_request'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/GeolocationResponse'
                type: array
          description: Successful response
        "4XX":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response (4XX)
      summary: Bulk IP Geolocation
      tags:
      - Geolocation
  /v1.0/subdomains:
    get:
      description: All subdomains including nested. 2 credits per query.
      operationId: subdomains
      parameters:
      - explode: true
        in: query
        name: domain
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: after
        required: false
        schema:
          format: date
          type: string
        style: form
      - explode: true
        in: query
        name: before
        required: false
        schema:
          format: date
          type: string
        style: form
      - explode: true
        in: query
        name: status
        required: false
        schema:
          enum:
          - active
          - inactive
          type: string
        style: form
      - explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: format
        required: false
        schema:
          default: json
          enum:
          - json
          - xml
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubdomainsResponse'
          description: Successful response
        "4XX":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response (4XX)
      summary: Subdomains Lookup
      tags:
      - Subdomains
  /v1.0/security:
    get:
      description: "Threat intel for IP — VPN, proxy, Tor, bots. 1 credit."
      operationId: ipReputation
      parameters:
      - explode: true
        in: query
        name: ip
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IpReputationResponse'
          description: Successful response
        "4XX":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response (4XX)
      summary: IP Reputation Lookup
      tags:
      - IP Reputation
    post:
      description: Up to 100 IPs.
      operationId: bulkIpReputation
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/bulkGeolocation_request'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/IpReputationResponse'
                type: array
          description: Successful response
        "4XX":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response (4XX)
      summary: Bulk IP Reputation
      tags:
      - IP Reputation
  /v1/domain/security:
    get:
      description: "Real-time domain threat assessment. Returns risk verdict, trust\
        \ score, DGA analysis, threat intelligence matches, and security signals.\
        \ 1 credit."
      operationId: domainReputation
      parameters:
      - description: The domain name to assess
        example: amazon.com
        explode: true
        in: query
        name: domainName
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: format
        required: false
        schema:
          default: json
          enum:
          - json
          - xml
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainReputationResponse'
          description: Successful response
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Invalid API key
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Not found
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Too many requests
      summary: Domain Reputation Lookup
      tags:
      - Domain Reputation
  /v2.0/asn-whois:
    get:
      description: WHOIS for an ASN. 1 credit.
      operationId: asnWhois
      parameters:
      - example: as15169
        explode: true
        in: query
        name: asn
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: format
        required: false
        schema:
          default: json
          enum:
          - json
          - xml
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsnWhoisResponse'
          description: Successful response
        "4XX":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response (4XX)
      summary: ASN WHOIS Lookup
      tags:
      - ASN WHOIS
  /v1.0/ip-whois:
    get:
      description: WHOIS for an IP address. 1 credit.
      operationId: ipWhois
      parameters:
      - explode: true
        in: query
        name: ip
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: format
        required: false
        schema:
          default: json
          enum:
          - json
          - xml
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IpWhoisResponse'
          description: Successful response
        "4XX":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response (4XX)
      summary: IP WHOIS Lookup
      tags:
      - IP WHOIS
  /v1.0/api-key/rotate:
    get:
      description: Rotate API Key. Returns the file/snapshot described by this operation.
      operationId: rotateApiKey
      parameters: []
      responses:
        "200":
          content:
            text/plain:
              schema:
                type: string
          description: Key rotated
        "401":
          content:
            text/plain:
              schema:
                type: string
          description: Not allowed
      summary: Rotate API Key
      tags:
      - Account
  /v1.0/whoisapi/usage:
    get:
      description: Account Usage. Returns the file/snapshot described by this operation.
      operationId: accountUsage
      parameters: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountUsageResponse'
          description: Successful response
        "4XX":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response (4XX)
      summary: Account Usage
      tags:
      - Account
  /v3.3/status:
    get:
      description: No API key required. Returns freshness of all downloadable files.
      operationId: databaseFileStatus
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabaseFileStatus'
          description: Successful response
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Too many requests
      security: []
      summary: Database File Status (Public)
      tags:
      - Account
    servers:
    - url: https://files.whoisfreaks.com
  /v3.1/download/domainer/gtld:
    get:
      description: Newly Registered gTLD (CSV). Returns the file/snapshot described
        by this operation.
      operationId: dbNewlyGtld
      parameters:
      - explode: true
        in: query
        name: whois
        required: true
        schema:
          type: boolean
        style: form
      - description: yyyy-MM-dd; omit for latest
        explode: true
        in: query
        name: date
        required: false
        schema:
          format: date
          type: string
        style: form
      - explode: true
        in: query
        name: tlds
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/octet-stream:
              schema:
                format: binary
                type: string
          description: CSV
        "4XX":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response (4XX)
      summary: Newly Registered gTLD (CSV)
      tags:
      - Databases - Newly Registered
    servers:
    - url: https://files.whoisfreaks.com
  /v3.1/download/domainer/cctld:
    get:
      description: Newly Registered ccTLD (CSV). Returns the file/snapshot described
        by this operation.
      operationId: dbNewlyCctld
      parameters:
